<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyponatriämie · Klinischer Entscheidungsbaum</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b26;
    --surface2: #1e2535;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --text2: #8a9bb8;
    --text3: #4f5f7a;
    --accent: #4e9fff;
    --accent-dim: rgba(78,159,255,0.12);
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.1);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.1);
    --red: #f25f5c;
    --red-dim: rgba(242,95,92,0.1);
    --teal: #2dd4bf;
    --teal-dim: rgba(45,212,191,0.1);
    --radius: 12px;
    --radius-sm: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    height: 60px;
    gap: 1rem;
    position: sticky;
    top: 0;
    background: rgba(14,17,23,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--accent); }
  .header-badge {
    margin-left: auto;
    font-size: 11px;
    color: var(--text3);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 3px 10px;
    letter-spacing: .04em;
  }

  /* ── LAYOUT ── */
  .main-grid {
    display: grid;
    grid-template-columns: 340px 1fr;
    min-height: calc(100vh - 60px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .sidebar-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: .5rem;
  }

  /* Osmolality Calculator */
  .calc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
  }
  .calc-card .label {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 4px;
    display: block;
  }
  .calc-card input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 8px 12px;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 10px;
  }
  .calc-card input:focus { border-color: var(--accent); }
  .calc-card input::placeholder { color: var(--text3); }
  .formula {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 1rem;
    font-style: italic;
  }
  .osmo-result {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .osmo-num {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--text);
    line-height: 1;
  }
  .osmo-unit { font-size: 12px; color: var(--text3); }
  .osmo-tag {
    margin-left: auto;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .tag-low { background: var(--accent-dim); color: var(--accent); }
  .tag-norm { background: var(--green-dim); color: var(--green); }
  .tag-high { background: var(--amber-dim); color: var(--amber); }

  /* Path trail */
  .path-trail {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .trail-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13px;
    color: var(--text2);
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeIn .3s ease;
  }
  .trail-item:last-child { border-bottom: none; }
  .trail-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: 5px;
    flex-shrink: 0;
  }

  /* Progress */
  .progress-wrap { }
  .progress-bar {
    height: 2px;
    background: var(--border2);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }
  .progress-label {
    font-size: 11px;
    color: var(--text3);
  }

  /* reset */
  .reset-btn {
    background: none;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 16px;
    cursor: pointer;
    width: 100%;
    transition: all .2s;
  }
  .reset-btn:hover {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--border2);
  }

  /* ── MAIN CONTENT ── */
  .content {
    padding: 3rem;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    max-width: 720px;
  }

  .step-question {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: var(--text);
    line-height: 1.35;
    margin-bottom: 2rem;
    animation: slideUp .35s ease;
    letter-spacing: -0.01em;
  }

  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    animation: slideUp .35s ease .05s both;
  }

  .opt-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    padding: 1.1rem 1.4rem;
    text-align: left;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 1rem;
    width: 100%;
  }
  .opt-btn:hover {
    background: var(--surface2);
    border-color: var(--accent);
    transform: translateX(4px);
  }
  .opt-btn:active { transform: translateX(2px) scale(.99); }
  .opt-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--accent-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 15px;
  }
  .opt-text { flex: 1; }
  .opt-main { font-size: 15px; font-weight: 500; color: var(--text); }
  .opt-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .opt-arrow { color: var(--text3); font-size: 18px; margin-left: auto; }

  /* therapy banner */
  .therapy-banner {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 1.1rem 1.4rem;
    width: 100%;
    margin-bottom: 10px;
    animation: slideUp .35s ease both;
  }
  .therapy-banner.green { border-left: 3px solid var(--green); }
  .therapy-banner.accent { border-left: 3px solid var(--accent); }
  .therapy-banner.amber { border-left: 3px solid var(--amber); }
  .therapy-banner.red { border-left: 3px solid var(--red); }
  .therapy-banner.teal { border-left: 3px solid var(--teal); }
  .tb-label {
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .tb-label.green { color: var(--green); }
  .tb-label.accent { color: var(--accent); }
  .tb-label.amber { color: var(--amber); }
  .tb-label.red { color: var(--red); }
  .tb-label.teal { color: var(--teal); }
  .tb-text {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.7;
    white-space: pre-line;
  }

  .warn-box {
    background: rgba(242,95,92,0.07);
    border: 1px solid rgba(242,95,92,0.25);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--red);
    margin-top: 8px;
    line-height: 1.6;
    width: 100%;
    animation: slideUp .35s ease .1s both;
  }

  .result-heading {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--text);
    margin-bottom: 1.5rem;
    animation: slideUp .35s ease;
  }

  /* ── ANIMATIONS ── */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── MOBILE ── */
  @media (max-width: 860px) {
    .main-grid { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); padding: 1.5rem; }
    .content { padding: 2rem 1.5rem; }
    .step-question { font-size: 20px; }
  }

/* ── TOOL NAV ── */
.tool-nav {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 0 1.5rem;
  height: 38px;
  background: rgba(14,17,23,0.98);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  overflow-x: auto;
  scrollbar-width: none;
}
.tool-nav::-webkit-scrollbar { display: none; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  color: rgba(232,234,240,0.45);
  text-decoration: none;
  white-space: nowrap;
  transition: all .15s;
  letter-spacing: .02em;
}
.nav-item:hover { color: rgba(232,234,240,0.85); background: rgba(255,255,255,0.06); }
.nav-item.active { color: #e8eaf0; background: rgba(255,255,255,0.09); }
.nav-icon { font-size: 13px; }
</style>
</head>
<body>

<header>
  <div class="logo">Hypo<span>Na</span></div>
  <span style="font-size:13px;color:var(--text2)">Klinischer Entscheidungsbaum · Hyponatriämie</span>
  <div class="header-badge">S-Na &lt; 135 mmol/l</div>
</header>
<nav class="tool-nav">
  <a href="index.html" class="nav-item">⌂ Übersicht</a>
  <a href="mcast.html" class="nav-item">mCAST</a>
  <a href="hypona.html" class="nav-item active">HypoNa</a>
  <a href="news2.html" class="nav-item">NEWS2</a>
  <a href="sofa.html" class="nav-item">SOFA</a>
  <a href="lae.html" class="nav-item">LAE</a>
</nav>

<div class="main-grid">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div>
      <div class="sidebar-title">Serum-Osmolalität</div>
      <div class="calc-card">
        <label class="label">Natrium (mmol/l)</label>
        <input type="number" id="na" placeholder="140" step="0.1" oninput="calcOsmo()">
        <label class="label">Glucose (mg/dl)</label>
        <input type="number" id="gluc" placeholder="90" step="1" oninput="calcOsmo()">
        <label class="label">Harnstoff (mg/dl)</label>
        <input type="number" id="bun" placeholder="35" step="1" oninput="calcOsmo()">
        <label class="label">Ethanol (mmol/l)</label>
        <input type="number" id="etoh" placeholder="0" step="0.1" oninput="calcOsmo()">
        <div class="formula">Formel: 2 × Na + Glucose/18 + Harnstoff/6 + Ethanol</div>
        <div class="osmo-result">
          <span class="osmo-num" id="osmo-val">—</span>
          <span class="osmo-unit">mOsm/kg</span>
          <span class="osmo-tag" id="osmo-tag" style="display:none"></span>
        </div>
      </div>
    </div>

    <div>
      <div class="sidebar-title">Diagnose-Pfad</div>
      <div class="path-trail" id="trail">
        <div style="font-size:13px;color:var(--text3);padding:4px 0;">Noch keine Auswahl getroffen.</div>
      </div>
    </div>

    <div>
      <div class="sidebar-title">Fortschritt</div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="prog" style="width:5%"></div></div>
        <div class="progress-label" id="prog-label">Schritt 0 von ~4</div>
      </div>
    </div>

    <button class="reset-btn" onclick="reset()">↺ Neu starten</button>
  </aside>

  <!-- MAIN -->
  <main class="content" id="content"></main>
</div>

<script>
const steps = {
  s0: {
    q: "Wie ist der klinische Zustand des Patienten?",
    opts: [
      { icon:"🔴", label:"Symptomatisch — schwer", sub:"Verwirrtheit, Krampfanfall, Ataxie, Koma, Atemdepression", next:"s1_symp" },
      { icon:"🟡", label:"Asymptomatisch oder milde Symptome", sub:"Kopfschmerz, Lethargie, Schwindel, Übelkeit", next:"s1_asymp" }
    ]
  },
  s1_symp: {
    q: "Therapie: NaCl 3% starten (Bolus 100–150 ml oder 0,5–2 ml/kg/h).\n\nKlinische Verbesserung nach Therapiebeginn?",
    opts: [
      { icon:"✅", label:"Ja — Besserung eingetreten", next:"s1_asymp_post_nacl" },
      { icon:"⏳", label:"Nein — keine Verbesserung", next:"end_monitor" }
    ]
  },
  s1_asymp_post_nacl: {
    warn: "⚠ Gefahr der osmotischen Demyelinisierung: Serum-Na alle 2 h kontrollieren. Ziel max. 8–10 mmol/l in 24 h. Bei Überkorrektur: DDAVP 2 µg i.v. + freies Wasser.",
    q: "Symptome rückläufig — NaCl 3% stoppen.\n\nUrsachensuche einleiten. Serum-Osmolalität?",
    opts: [
      { icon:"↓", label:"Erniedrigt", sub:"< 280 mOsm/kg · Hypotone Hyponatriämie", next:"s2_hypoton" },
      { icon:"→", label:"Normal", sub:"280–285 mOsm/kg · Isotonische Hyponatriämie", next:"end_isoton" },
      { icon:"↑", label:"Erhöht", sub:"> 285 mOsm/kg · Hypertone Hyponatriämie", next:"end_hyperton" }
    ]
  },
  s1_asymp: {
    q: "Serum-Osmolalität (→ Rechner links nutzen)?",
    opts: [
      { icon:"↓", label:"Erniedrigt", sub:"< 280 mOsm/kg · Hypotone Hyponatriämie", next:"s2_hypoton" },
      { icon:"→", label:"Normal", sub:"280–285 mOsm/kg · Isotonische Hyponatriämie", next:"end_isoton" },
      { icon:"↑", label:"Erhöht", sub:"> 285 mOsm/kg · Hypertone Hyponatriämie", next:"end_hyperton" }
    ]
  },
  s2_hypoton: {
    q: "Klinischer Volumenstatus des Patienten?",
    opts: [
      { icon:"📉", label:"Hypovolämie", sub:"Trockene Schleimhäute, Tachykardie, Hypotonie, verminderter Hautturgor", next:"s3_hypo" },
      { icon:"⚖️", label:"Euvolämie", sub:"Keine Ödem- oder Dehydrationszeichen", next:"s3_eu" },
      { icon:"📈", label:"Hypervolämie", sub:"Periphere Ödeme, Aszites, Lungenstauung, erhöhter ZVD", next:"s3_hyper" }
    ]
  },
  s3_hypo: {
    q: "Urin-Natrium (U-Na)?",
    opts: [
      { icon:"↑", label:"U-Na > 20 mmol/l", sub:"Renale Natriumverluste", next:"end_renal_loss" },
      { icon:"↓", label:"U-Na < 20 mmol/l", sub:"Extrarenale Natriumverluste", next:"end_extrarenal_loss" }
    ]
  },
  s3_hyper: {
    q: "Urin-Natrium (U-Na)?",
    opts: [
      { icon:"↓", label:"U-Na < 20 mmol/l", sub:"Effektive Hypovolämie (Herzinsuffizienz, Leber, Albumin)", next:"end_hf_cirr" },
      { icon:"↑", label:"U-Na > 20 mmol/l", sub:"Niereninsuffizienz", next:"end_renal_insuff" }
    ]
  },
  s3_eu: {
    q: "Urin-Osmolalität (U-Osm)?",
    opts: [
      { icon:"↑", label:"U-Osm > 100 mOsm/kg", sub:"Konzentrierter Urin — ADH aktiv", next:"end_siadh" },
      { icon:"↓", label:"U-Osm < 100 mOsm/kg", sub:"Maximal verdünnter Urin — ADH supprimiert", next:"end_polydipsia" },
      { icon:"~", label:"Variabel / nicht eindeutig", sub:"Wechselnde Urin-Osmolalität", next:"end_reset_osmo" }
    ]
  }
};

const ends = {
  end_stop_nacl: {
    title: "NaCl 3% stoppen — Ursachensuche",
    items: [
      { color:"accent", label:"Diagnose-Schritt", text:"Klinische Verbesserung unter hypertoner Kochsalzlösung." },
      { color:"green", label:"Maßnahmen", text:"STOP NaCl 3% sofort.\nSerum-Na alle 2 Stunden kontrollieren.\nUrsachensuche einleiten (Volumen, Medikamente, SIADH-Screening).\nZielkorridor: max. 8–10 mmol/l in 24 h, max. 18 mmol/l in 48 h." },
    ],
    warn:"⚠ Gefahr der osmotischen Demyelinisierung bei zu rascher Korrektur. Bei raschem Na-Anstieg: DDAVP 2 µg i.v. + freies Wasser erwägen."
  },
  end_monitor: {
    title: "Monitoring fortführen",
    items: [
      { color:"amber", label:"Situation", text:"Keine klinische Verbesserung unter NaCl 3%." },
      { color:"green", label:"Maßnahmen", text:"NaCl 3% weiterführen (0,5–2 ml/kg/h).\nSerum-Na alle 2 Stunden messen.\nParallel Ursachensuche: Bildgebung, Labor (Cortisol, TSH, Urin-Osmolalität).\nGgf. Intensivmedizin hinzuziehen." }
    ],
    warn: null
  },
  end_isoton: {
    title: "Isotonische Hyponatriämie — Pseudohyponatriämie",
    items: [
      { color:"teal", label:"Diagnose", text:"Serum-Osmolalität normal → laborchemisches Artefakt durch Verdrängung des Wasseranteils." },
      { color:"green", label:"Ursachen & Therapie", text:"Hyperproteinämie (z.B. Multiples Myelom, Makroglobulinämie)\nHypertriglyzeridämie (Triglyzeride > 11 mmol/l)\n→ Keine spezifische Na-Therapie. Grunderkrankung behandeln." }
    ],
    warn: null
  },
  end_hyperton: {
    title: "Hypertone Hyponatriämie",
    items: [
      { color:"teal", label:"Diagnose", text:"Erhöhte Osmolalität durch andere osmotisch aktive Substanzen → dilutionale Hyponatriämie." },
      { color:"green", label:"Ursachen & Therapie", text:"Hyperglykämie: Na korrigiert sich um ~1,6 mmol/l pro 5,5 mmol/l Glukoseanstieg\nMannitol, Kontrastmittel, Sorbit\n→ Grunderkrankung behandeln. Glukosekorrektur bei diabetischer Entgleisung." }
    ],
    warn: null
  },
  end_renal_loss: {
    title: "Hypovolämie — Renale Natriumverluste",
    items: [
      { color:"teal", label:"Diagnose", text:"U-Na > 20 mmol/l bei Hypovolämie → Niere retiniert kein Natrium trotz Volumenmangel." },
      { color:"accent", label:"Ursachen", text:"Thiazid-Diuretika (häufigste Ursache!)\nMorbus Addison / Mineralokortikoiddefizienz\nZerebrale Salzverschwendung (Cave: Abgrenzung zu SIADH wichtig)\nSalzverlustnephropathie" },
      { color:"green", label:"Therapie", text:"NaCl 0,9% Volumenersatz i.v.\nBei V.a. Addison: Hydrocortison 100 mg i.v. sofort, dann Substitution\nDiuretika pausieren" }
    ],
    warn: null
  },
  end_extrarenal_loss: {
    title: "Hypovolämie — Extrarenale Natriumverluste",
    items: [
      { color:"teal", label:"Diagnose", text:"U-Na < 20 mmol/l — Niere retiniert Natrium kompensatorisch → Verlust außerhalb der Niere." },
      { color:"accent", label:"Ursachen", text:"Erbrechen (Emesis)\nDurchfall (Diarrhoe)\nIleus, intestinale Fisteln\nSchwitzen, Verbrennung" },
      { color:"green", label:"Therapie", text:"NaCl 0,9% Volumenersatz i.v.\nOrale Rehydratation wenn toleriert\nGrunderkrankung behandeln" }
    ],
    warn: null
  },
  end_hf_cirr: {
    title: "Hypervolämie — Effektive Hypovolämie",
    items: [
      { color:"teal", label:"Diagnose", text:"U-Na < 20 mmol/l — Trotz Volumenüberschuss aktiviertes RAAS durch verminderten effektiven Kreislauf." },
      { color:"accent", label:"Ursachen", text:"Herzinsuffizienz (systolisch / diastolisch)\nLeberzirrhose mit Aszites\nHypoalbuminämie / nephrotisches Syndrom" },
      { color:"green", label:"Therapie", text:"Flüssigkeitsrestriktion (< 1.000 ml/d)\nSchleifendiuretika (Furosemid)\nGrunderkrankung optimieren (Herztherapie, Albumin bei Zirrhose)\nCave: Keine hypotone Infusion!" }
    ],
    warn: null
  },
  end_renal_insuff: {
    title: "Hypervolämie — Niereninsuffizienz",
    items: [
      { color:"teal", label:"Diagnose", text:"U-Na > 20 mmol/l bei Hypervolämie → eingeschränkte renale Natriumretention und Wasserausscheidung." },
      { color:"accent", label:"Ursachen", text:"Akute Nierenschädigung (AKI)\nChronische Nierenerkrankung (CKD Stadium 4–5)" },
      { color:"green", label:"Therapie", text:"Flüssigkeitsrestriktion\nSchleifendiuretika (wenn noch Restdiurese vorhanden)\nDialyse bei therapierefraktärer Hyponatriämie oder Urämie" }
    ],
    warn: null
  },
  end_siadh: {
    title: "Euvolämie — SIADH-Spektrum",
    items: [
      { color:"teal", label:"Diagnose", text:"U-Osm > 100 mOsm/kg + Euvolämie → inadäquate ADH-Aktivität trotz Hypoosmolalität." },
      { color:"accent", label:"Ursachen", text:"SIADH: Malignome (Lunge!), ZNS-Erkrankungen, Pneumonie, HIV\nMedikamente: SSRIs, Carbamazepin, Cyclophosphamid, NSAIDs\nHypothyreose (TSH bestimmen!)\nNebenniereninsuffizienz (Cortisol-Stimulationstest)" },
      { color:"green", label:"Therapie", text:"Flüssigkeitsrestriktion 500–800 ml/d (restriktiver als Diurese)\nBei schwerem SIADH: Vaptane (Tolvaptan) — Cave: Hepatotoxizität\nHypertonische NaCl nur bei Symptomen\nHormonsubs titution bei Hypothyreose / NNR-Insuffizienz\nCave: Thiazide vermeiden!" }
    ],
    warn: null
  },
  end_polydipsia: {
    title: "Euvolämie — Primäre Polydipsie / Bier-Potomanie",
    items: [
      { color:"teal", label:"Diagnose", text:"U-Osm < 100 mOsm/kg → maximale Wasserdiurese, ADH vollständig supprimiert. Überschreitung der renalen Ausscheidungskapazität." },
      { color:"accent", label:"Ursachen", text:"Psychogene Polydipsie (häufig bei Schizophrenie)\nBier-Potomanie: Hohe Flüssigkeitszufuhr + sehr geringe Osmolataufnahme → unzureichende Solut für freie Wasserausscheidung" },
      { color:"green", label:"Therapie", text:"Flüssigkeitsrestriktion\nErnährungsberatung (ausreichend Protein und Salz)\nBehandlung psychiatrischer Grunderkrankung\nNa-Korrektur meist ohne hypertone NaCl möglich" }
    ],
    warn: null
  },
  end_reset_osmo: {
    title: "Euvolämie — Reset Osmostat / SIAD",
    items: [
      { color:"teal", label:"Diagnose", text:"Variable Urin-Osmolalität → tieferer physiologischer Osmostat-Sollwert. Osmoregulation intakt, aber auf niedrigerem Niveau." },
      { color:"accent", label:"Ursachen", text:"Schwangerschaft (physiologisch!)\nChronische Unterernährung\nQuerschnittlähmung\nSIAD (Syndrome of Inappropriate Antidiuresis ohne klassisches SIADH)" },
      { color:"green", label:"Therapie", text:"Meist keine spezifische Na-Therapie notwendig\nFlüssigkeitsrestriktion moderat\nGrunderkrankung klären\nEnge Verlaufskontrolle" }
    ],
    warn: null
  }
};

let path = [];
let current = "s0";

const colorMap = {
  accent: { bg:'rgba(78,159,255,0.08)', border:'#4e9fff', label:'#4e9fff' },
  green:  { bg:'rgba(62,207,142,0.08)', border:'#3ecf8e', label:'#3ecf8e' },
  amber:  { bg:'rgba(245,166,35,0.08)', border:'#f5a623', label:'#f5a623' },
  red:    { bg:'rgba(242,95,92,0.08)',  border:'#f25f5c', label:'#f25f5c' },
  teal:   { bg:'rgba(45,212,191,0.08)', border:'#2dd4bf', label:'#2dd4bf' }
};

function calcOsmo() {
  const na = parseFloat(document.getElementById('na').value) || 0;
  const gl = parseFloat(document.getElementById('gluc').value) || 0;
  const bu = parseFloat(document.getElementById('bun').value) || 0;
  const et = parseFloat(document.getElementById('etoh').value) || 0;
  if (!na && !gl && !bu) {
    document.getElementById('osmo-val').textContent = '—';
    document.getElementById('osmo-tag').style.display = 'none';
    return;
  }
  const v = 2 * na + (gl / 18) + (bu / 6) + et;
  const rv = Math.round(v * 10) / 10;
  document.getElementById('osmo-val').textContent = rv.toFixed(1);
  const tag = document.getElementById('osmo-tag');
  tag.style.display = '';
  if (rv < 280) { tag.textContent = 'Erniedrigt'; tag.className = 'osmo-tag tag-low'; }
  else if (rv <= 285) { tag.textContent = 'Normal'; tag.className = 'osmo-tag tag-norm'; }
  else { tag.textContent = 'Erhöht'; tag.className = 'osmo-tag tag-high'; }
}

function choose(label, next) {
  path.push(label);
  renderTrail();
  if (ends[next]) {
    showResult(ends[next]);
    updateProgress(100, path.length);
  } else {
    current = next;
    renderStep();
    updateProgress(Math.min(90, path.length * 22), path.length);
  }
}

function renderStep() {
  const s = steps[current];
  const el = document.getElementById('content');
  const div = document.createElement('div');
  div.innerHTML = `<div class="step-question">${s.q.replace(/\n/g,'<br>')}</div>${s.warn ? `<div class="warn-box" style="margin-bottom:1.5rem">${s.warn}</div>` : ''}<div class="options-grid" id="opts"></div>`;
  el.innerHTML = '';
  el.appendChild(div);
  const grid = document.getElementById('opts');
  s.opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<div class="opt-icon">${o.icon||'→'}</div><div class="opt-text"><div class="opt-main">${o.label}</div>${o.sub ? `<div class="opt-sub">${o.sub}</div>` : ''}</div><div class="opt-arrow">›</div>`;
    btn.addEventListener('click', () => choose(o.label, o.next));
    grid.appendChild(btn);
  });
}

function showResult(e) {
  const content = document.getElementById('content');
  let html = `<div class="result-heading">${e.title}</div>`;
  e.items.forEach((item, i) => {
    const c = colorMap[item.color] || colorMap.accent;
    html += `<div class="therapy-banner ${item.color}" style="animation-delay:${i*0.08}s">
      <div class="tb-label ${item.color}">${item.label}</div>
      <div class="tb-text">${item.text}</div>
    </div>`;
  });
  if (e.warn) {
    html += `<div class="warn-box">${e.warn}</div>`;
  }
  content.innerHTML = html;
}

function renderTrail() {
  const trail = document.getElementById('trail');
  if (!path.length) {
    trail.innerHTML = '<div style="font-size:13px;color:var(--text3);padding:4px 0;">Noch keine Auswahl getroffen.</div>';
    return;
  }
  trail.innerHTML = path.map(p => `<div class="trail-item"><div class="trail-dot"></div><div>${p}</div></div>`).join('');
}

function updateProgress(pct, step) {
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-label').textContent =
    pct === 100 ? 'Diagnose vollständig' : `Schritt ${step} von ~4`;
}

function reset() {
  path = [];
  current = 's0';
  renderStep();
  renderTrail();
  updateProgress(5, 0);
}

renderStep();
</script>
</body>
</html>
